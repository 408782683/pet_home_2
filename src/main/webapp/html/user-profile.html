<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>个人中心 - 伴侣宠物之家🐾</title>

  <!-- Element UI CSS -->
  <link rel="stylesheet" href="/css/index.css">
  <!-- Vue CDN -->
  <script src="/js/vue.min.js"></script>
  <!-- Element UI JS -->
  <script src="/js/index.js"></script>
  <!--引入检查登录状态-->
  <script src="/js/check.js"></script>

  <link rel="stylesheet" href="/css/user-profile.css">
</head>
<body>

<div id="app">

  <!-- 顶部导航栏 -->
  <div class="top-navbar">
    <div class="navbar-content">
      <div class="logo">
        <span class="pet-icon">🐾</span>
        <span class="logo-text">伴侣宠物之家</span>
      </div>
      <!-- 导航菜单 -->
      <div class="nav-menu">
        <div class="nav-item"
             @click="goTo('/html/userhome.html')">
          <i class="el-icon-s-home"></i>
          <span>首页</span>
        </div>
        <div class="nav-item"
             @click="goTo('/html/productlist.html')">
          <i class="el-icon-shopping-bag-2"></i>
          <span>商品一览</span>
        </div>
        <div class="nav-item"
             @click="goTo('/html/insurancelist.html')">
          <i class="el-icon-s-home"></i>
          <span>宠物保险</span>
        </div>
        <div class="nav-item"
             @click="goTo('/html/policylist.html')">
          <i class="el-icon-document-checked"></i>
          <span>我的保单</span>
        </div>
        <div class="nav-item"
             @click="goTo('/html/claimlist.html')">
          <i class="el-icon-warning-outline"></i>
          <span>申保记录</span>
        </div>
        <div class="nav-item"
             @click="goTo('/html/hospitallist.html')">
          <i class="el-icon-office-building"></i>
          <span>宠物医院</span>
        </div>
        <div class="nav-item"
             @click="goTo('/html/appointmentlist.html')">
          <i class="el-icon-s-order"></i>
          <span>预约记录</span>
        </div>
        <div class="nav-item"
             @click="goTo('/html/breedinglist.html')">
          <i class="el-icon-search"></i>
          <span>寻找配种</span>
        </div>
        <div class="nav-item"
             @click="goTo('/html/fosterlist.html')">
          <i class="el-icon-house"></i>
          <span>宠物寄养</span>
        </div>
        <div class="nav-item"
             @click="goTo('/html/adoptionlist.html')">
          <i class="el-icon-present"></i>
          <span>宠物领养</span>
        </div>
        <div class="nav-item"
             @click="goTo('/html/forumlist.html')">
          <i class="el-icon-chat-dot-square"></i>
          <span>论坛</span>
        </div>
        <div class="nav-item"
             @click="goTo('/html/usercart.html')">
          <i class="el-icon-shopping-cart-2"></i>
          <span>购物车</span>
        </div>
        <div class="nav-item"
             @click="goTo('/html/orderlist.html')">
          <i class="el-icon-s-order"></i>
          <span>我的订单</span>
        </div>
        <div class="nav-item"
             @click="goTo('/html/reviewlist.html')">
          <i class="el-icon-chat-line-square"></i>
          <span>我的评价</span>
        </div>
      </div>

      <!-- 用户信息 -->
      <div class="user-info" v-if="userInfo" @click="toggleDropdown">
        <img :src="userInfo.avatar || defaultAvatar" class="user-avatar">
        <span class="username">{{ userInfo.nickname }}</span>
        <i class="el-icon-arrow-down"></i>

        <!-- 下拉菜单 -->
        <div class="user-dropdown" :class="{ show: dropdownVisible }">
          <div class="dropdown-item" @click.stop="goToProfile">个人资料</div>
          <div class="dropdown-divider"></div>
          <div class="dropdown-item" @click.stop="logout">退出登录</div>
        </div>
      </div>
    </div>
  </div>


  <div class="profile-container" v-loading="loading">
    <el-card class="profile-card">
      <div slot="header" class="card-header">
        <i class="el-icon-user"></i>
        <span>个人中心</span>
      </div>

      <el-form
              :model="form"
              :rules="rules"
              ref="profileForm"
              label-width="100px"
              class="profile-form"
      >
        <!-- 头像区域 -->
        <div class="avatar-section">
          <el-form-item label="当前头像">
            <div class="avatar-wrapper">
              <el-avatar :src="form.avatar || defaultAvatar" :size="120"></el-avatar>
            </div>
          </el-form-item>

          <el-form-item label="上传新头像">
            <el-upload
                    class="avatar-uploader"
                    :action="uploadAction"
                    :show-file-list="false"
                    :on-success="handleUploadSuccess"
                    :on-error="handleUploadError"
                    :before-upload="beforeUpload"
                    :headers="uploadHeaders"
                    accept="image/*"
            >
              <el-button size="small" type="primary" icon="el-icon-upload">选择图片上传</el-button>
              <div slot="tip" class="el-upload__tip">支持jpg、png、gif格式，大小不超过5MB</div>
            </el-upload>
          </el-form-item>
        </div>

        <!-- 表单字段 -->
        <el-form-item label="用户名">
          <el-input v-model="form.username" disabled></el-input>
        </el-form-item>

        <el-form-item label="角色">
          <el-input v-model="form.role" disabled></el-input>
        </el-form-item>

        <el-form-item label="昵称" prop="nickname">
          <el-input v-model="form.nickname" placeholder="请输入昵称"></el-input>
        </el-form-item>

        <el-form-item label="手机号" prop="phone">
          <el-input v-model="form.phone" placeholder="请输入手机号"></el-input>
        </el-form-item>

        <el-form-item label="邮箱" prop="email">
          <el-input v-model="form.email" placeholder="请输入邮箱"></el-input>
        </el-form-item>

        <el-form-item label="注册时间">
          <el-input v-model="form.createTime" disabled></el-input>
        </el-form-item>

        <!-- 操作按钮 -->
        <el-form-item class="button-group">
          <el-button type="primary" @click="submitForm" :loading="loading">保存修改</el-button>
          <el-button @click="resetForm">重置</el-button>
          <el-button @click="goToHome">返回首页</el-button>
        </el-form-item>
      </el-form>
    </el-card>
  </div>
</div>

<script>
  new Vue({
    el: '#app',
    data() {
      return {
        userInfo: {},
        form: {
          id: '',
          username: '',
          role: '',
          nickname: '',
          avatar: '',
          phone: '',
          email: '',
          createTime: ''
        },
        rules: {
          nickname: [
            { required: true, message: '请输入昵称', trigger: 'blur' }
          ],
          email: [
            { type: 'email', message: '请输入正确的邮箱地址', trigger: 'blur' }
          ]
        },
        loading: false,
        uploadAction: 'http://localhost:18001/api/file/upload',
        uploadHeaders: {},
        defaultAvatar: 'https://img1.baidu.com/it/u=1666852494,3843174075&fm=253&fmt=auto&app=138&f=JPEG?w=500&h=500',
        dropdownVisible: false
      };
    },
    created() {
      this.loadUserInfo();
      this.setUploadHeaders();
    },
    methods: {
      // 加载用户信息
      loadUserInfo() {
        const userInfoStr = localStorage.getItem('userInfo');
        if (userInfoStr) {
          this.userInfo = JSON.parse(userInfoStr);
          console.log(this.userInfo.createTime)
          // 模拟从后端获取最新信息（实际应调用 API）
          this.form.id = this.userInfo.id;
          this.form.username = this.userInfo.username || 'user_' + this.userInfo.id;
          this.form.role = this.userInfo.role || '普通用户';
          this.form.nickname = this.userInfo.nickname || '未设置';
          this.form.avatar = this.userInfo.avatar || '';
          this.form.phone = this.userInfo.phone || '';
          this.form.email = this.userInfo.email || '';
          this.form.createTime = this.formatDate(this.userInfo.createTime || Date.now());
        } else {
          this.$message.warning('请先登录');
          window.location.href = '/index.html';
        }
      },

      // 设置上传请求头
      setUploadHeaders() {
        const token = localStorage.getItem('authToken');
        if (token) {
          this.uploadHeaders = { Authorization: `Bearer ${token}` };
        } else {
          this.uploadHeaders = {};
        }
      },

      // 提交表单
      submitForm() {
        this.$refs.profileForm.validate((valid) => {
          if (valid) {
            this.loading = true;
            // 模拟保存
            setTimeout(() => {
              // 更新本地存储
              const updatedUser = {
                ...this.userInfo,
                nickname: this.form.nickname,
                avatar: this.form.avatar,
                phone: this.form.phone,
                email: this.form.email
              };
              localStorage.setItem('userInfo', JSON.stringify(updatedUser));
              this.userInfo = updatedUser;
              this.loading = false;
              this.$message.success('个人信息更新成功');
            }, 800);
          }
        });
      },

      // 重置表单
      resetForm() {
        this.loadUserInfo();
        this.$message.info('表单已重置');
      },

      // 返回首页
      goToHome() {
        window.location.href = '/html/userhome.html';
      },

      // 格式化日期
      formatDate(date) {
        if (!date) return '';
        const d = new Date(date);
        return d.toLocaleString('zh-CN', {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit'
        });
      },

      // 文件上传前校验
      beforeUpload(file) {
        const isImage = file.type.startsWith('image/');
        if (!isImage) {
          this.$message.error('只能上传图片文件');
          return false;
        }
        const isLt5M = file.size / 1024 / 1024 < 5;
        if (!isLt5M) {
          this.$message.error('图片大小不能超过5MB');
          return false;
        }
        return true;
      },

      // 上传成功
      handleUploadSuccess(response, file) {
        if (response.success) {
          this.form.avatar = response.data;
          // 自动保存头像
          this.submitForm();
        } else {
          this.$message.error(response.message || '上传失败');
        }
      },

      // 上传失败
      handleUploadError(err, file) {
        console.error('上传失败:', err);
        this.$message.error('上传失败，请重试');
      },

      // 跳转页面
      goTo(path) {
        window.location.href = path;
      },

      // 跳转个人资料页面
      goToProfile() {
        window.location.href = '/html/user-profile.html';
      },

      logout() {
        localStorage.removeItem('userInfo');
        localStorage.removeItem("authToken");
        this.userInfo = null;
        window.location.href = '/index.html';
      },

      toggleDropdown() {
        this.dropdownVisible = !this.dropdownVisible;
      }
    }
  });
</script>

</body>
</html>
